# 适用于 Mihomo 核心
# 日常主力极简分流：远程规则，局域网直连，国内流量进入「全球直连」可按需切换，AI/娱乐内容独立出口，轻量代理规则命中流量进入「节点选择」，未命中规则流量进入「漏网之鱼」

proxy-groups:
# 节点选择 - 日常总控入口，保持清爽，不直接展开大量节点
- name: 节点选择
  type: select
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"
  proxies:
  - 自动测速
  - 手动切换
  - DIRECT

# 手动切换 - 全节点手动池，细选具体节点时进入这里
- name: 手动切换
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"

# 自动测速代理组 - 根据测试 URL 和延迟自动选择节点
- name: 自动测速
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# AI - 海外 AI 服务统一进入这里，方便固定更稳定的出口
- name: AI
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png"
  proxies:
  - 节点选择
  - 自动测速
  - 手动切换
  - DIRECT

# 娱乐内容 - 视频、音乐、直播等泛娱乐内容统一进入这里，方便按地区切换
- name: 娱乐内容
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Star.png"
  proxies:
  - 节点选择
  - 自动测速
  - 手动切换
  - DIRECT

# 全球直连 - 默认直连，必要时可临时切到代理策略
- name: 全球直连
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png"
  proxies:
  - DIRECT
  - 节点选择
  - 自动测速

# 漏网之鱼 - 未命中分流规则的最终兜底出口
- name: 漏网之鱼
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"
  proxies:
  - 节点选择
  - 自动测速
  - 手动切换
  - DIRECT

rule-providers:
  private:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/private.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs
    interval: 86400
  google@cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/google@cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google@cn.mrs
    interval: 86400
  apple@cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/apple@cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple@cn.mrs
    interval: 86400
  microsoft@cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/microsoft@cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft@cn.mrs
    interval: 86400
  category-games@cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/category-games@cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-games@cn.mrs
    interval: 86400
  cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/geolocation-cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-cn.mrs
    interval: 86400
  category-ai-!cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/category-ai-!cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs
    interval: 86400
  category-entertainment:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/category-entertainment.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-entertainment.mrs
    interval: 86400
  gfw:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/metacubex/gfw.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs
    interval: 86400

rules:
# 局域网 / 私有地址
- RULE-SET,private,DIRECT

# 国内服务可切换直连
- RULE-SET,google@cn,全球直连
- RULE-SET,apple@cn,全球直连
- RULE-SET,microsoft@cn,全球直连
- RULE-SET,category-games@cn,全球直连

# AI 服务
- RULE-SET,category-ai-!cn,AI

# 娱乐内容：视频、音乐、直播、动漫等泛娱乐内容
- RULE-SET,category-entertainment,娱乐内容

# GFW 轻量代理规则命中
- RULE-SET,gfw,节点选择

# 国内兜底
- RULE-SET,cn,全球直连
- GEOIP,CN,全球直连

# 最终兜底
- MATCH,漏网之鱼
