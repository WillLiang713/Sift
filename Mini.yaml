rules:
# 局域网 / 私有地址
- RULE-SET,private,DIRECT
- RULE-SET,privateip,DIRECT

# 国内服务直连
- RULE-SET,google-cn,DIRECT
- RULE-SET,apple-cn,DIRECT
- RULE-SET,microsoft-cn,DIRECT
- RULE-SET,games-cn,DIRECT

# AI 服务
- RULE-SET,ai,AI

# 流媒体 / 娱乐服务
- RULE-SET,media,流媒体

# GFW 轻量代理规则命中
- RULE-SET,gfw,节点选择

# 国内兜底
- RULE-SET,cn,DIRECT
- RULE-SET,cnip,DIRECT

# 最终兜底
- MATCH,漏网之鱼
