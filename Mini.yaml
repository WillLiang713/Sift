# 适用于 Mihomo 核心
# 日常主力极简分流：ACL4SSR 远程规则，国内/局域网直连，AI/流媒体独立出口，GFW 命中流量进入「节点选择」，未命中规则流量进入「漏网之鱼」

dns:
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - localhost
  - time.*.com
  - time.*.gov
  - time.*.edu.cn
  - time.*.apple.com
  - time-ios.apple.com
  - time1.cloud.tencent.com
  - ntp.*.com
  - ntp?.*.com
  - "+.pool.ntp.org"
  - "+.msftconnecttest.com"
  - "+.msftncsi.com"
  - "+.stun.*.*"
  - "+.stun.*.*.*"
  - "+.stun.*.*.*.*"

proxy-groups:
# 节点选择代理组 - 用户可以手动选择代理节点
- name: 节点选择
  type: select
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"
  include-all: true
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 自动测速代理组 - 根据测试 URL 和延迟自动选择节点
- name: 自动测速
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# AI - 海外 AI 服务统一进入这里，方便固定更稳定的出口
- name: AI
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 节点选择
  - DIRECT

# 流媒体 - 视频、音乐、直播等娱乐服务统一进入这里，方便按地区切换
- name: 流媒体
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Streaming.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 节点选择
  - DIRECT

# 漏网之鱼 - 未命中分流规则的最终兜底出口
- name: 漏网之鱼
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 节点选择
  - DIRECT

rule-providers:
  LocalAreaNetwork:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/LocalAreaNetwork.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/LocalAreaNetwork.yaml
    interval: 86400
  GoogleCN:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/GoogleCN.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/GoogleCN.yaml
    interval: 86400
  SteamCN:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/SteamCN.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/SteamCN.yaml
    interval: 86400
  SteamRegionCheck:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/SteamRegionCheck.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/SteamRegionCheck.yaml
    interval: 86400
  ChinaDomain:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/ChinaDomain.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/ChinaDomain.yaml
    interval: 86400
  ChinaIp:
    type: http
    behavior: ipcidr
    path: ./ruleset/acl4ssr/ChinaIp.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/ChinaIp.yaml
    interval: 86400
  ChinaIpV6:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/ChinaIpV6.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/ChinaIpV6.yaml
    interval: 86400
  AI:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/AI.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/AI.yaml
    interval: 86400
  ProxyMedia:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/ProxyMedia.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/ProxyMedia.yaml
    interval: 86400
  ProxyGFWlist:
    type: http
    behavior: classical
    path: ./ruleset/acl4ssr/ProxyGFWlist.yaml
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/ProxyGFWlist.yaml
    interval: 86400

rules:
# 局域网 / 私有地址
- RULE-SET,LocalAreaNetwork,DIRECT

# 国内服务和地区检测直连
- RULE-SET,GoogleCN,DIRECT
- RULE-SET,SteamCN,DIRECT
- RULE-SET,SteamRegionCheck,DIRECT

# AI 服务
- RULE-SET,AI,AI

# 流媒体 / 娱乐服务
- RULE-SET,ProxyMedia,流媒体

# GFW 命中代理
- RULE-SET,ProxyGFWlist,节点选择

# 国内兜底
- RULE-SET,ChinaDomain,DIRECT
- RULE-SET,ChinaIpV6,DIRECT
- RULE-SET,ChinaIp,DIRECT

# 最终兜底
- MATCH,漏网之鱼
