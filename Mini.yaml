# 适用于 Mihomo 核心
# 日常主力极简分流：远程规则，国内/局域网直连，AI/流媒体独立出口，轻量代理规则命中流量进入「节点选择」，未命中规则流量进入「漏网之鱼」

dns:
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - localhost
  - time.*.com
  - time.*.gov
  - time.*.edu.cn
  - time.*.apple.com
  - time-ios.apple.com
  - time1.cloud.tencent.com
  - ntp.*.com
  - ntp?.*.com
  - "+.pool.ntp.org"
  - "+.msftconnecttest.com"
  - "+.msftncsi.com"
  - "+.stun.*.*"
  - "+.stun.*.*.*"
  - "+.stun.*.*.*.*"

proxy-groups:
# 节点选择代理组 - 用户可以手动选择代理节点
- name: 节点选择
  type: select
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"
  include-all: true
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 自动测速代理组 - 根据测试 URL 和延迟自动选择节点
- name: 自动测速
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# AI - 海外 AI 服务统一进入这里，方便固定更稳定的出口
- name: AI
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 节点选择
  - DIRECT

# 流媒体 - 视频、音乐、直播等娱乐服务统一进入这里，方便按地区切换
- name: 流媒体
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Streaming.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 节点选择
  - DIRECT

# 漏网之鱼 - 未命中分流规则的最终兜底出口
- name: 漏网之鱼
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 节点选择
  - DIRECT

