# 适用于 Mihomo 核心
# 精简分流：ACL4SSR 规则源，国内/局域网/游戏直连，商店/流媒体/AI按场景分流，未命中规则流量进入「漏网之鱼」

dns:
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - localhost
  - time.*.com
  - time.*.gov
  - time.*.edu.cn
  - time.*.apple.com
  - time-ios.apple.com
  - time1.cloud.tencent.com
  - ntp.*.com
  - ntp?.*.com
  - "+.pool.ntp.org"
  - "+.msftconnecttest.com"
  - "+.msftncsi.com"
  - "+.stun.*.*"
  - "+.stun.*.*.*"
  - "+.stun.*.*.*.*"

proxy-groups:
# 统一代理出口 - 国外流量进入这里，放在最前方便面板快速选择
- name: 代理出口
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 手动切换
  - 自建节点
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 台湾节点
  - 韩国节点
  - 其他节点
  - DIRECT

# AI 出口 - 海外 AI 服务统一进入这里，方便固定更稳定的出口
- name: AI出口
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 手动切换
  - 自建节点
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 台湾节点
  - 韩国节点
  - 其他节点
  - DIRECT

