# 适用于 Mihomo 核心
# 精简分流：Mihomo GEOSITE/GEOIP 规则，国内/局域网/游戏直连，GFW 命中流量进入「手动切换」，商店/流媒体/AI按场景分流，未命中规则流量进入「漏网之鱼」

dns:
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - localhost
  - time.*.com
  - time.*.gov
  - time.*.edu.cn
  - time.*.apple.com
  - time-ios.apple.com
  - time1.cloud.tencent.com
  - ntp.*.com
  - ntp?.*.com
  - "+.pool.ntp.org"
  - "+.msftconnecttest.com"
  - "+.msftncsi.com"
  - "+.stun.*.*"
  - "+.stun.*.*.*"
  - "+.stun.*.*.*.*"

proxy-groups:
# 手动切换代理组 - 用户可以手动切换代理节点
- name: 手动切换
  type: select
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"
  include-all: true
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 自动测速代理组 - 根据测试 URL 和延迟自动选择节点
- name: 自动测速
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# AI 出口 - 海外 AI 服务统一进入这里，方便固定更稳定的出口
- name: AI出口
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 手动切换
  - 自建节点
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 台湾节点
  - 韩国节点
  - 其他节点
  - DIRECT

# 流媒体 - 视频、音乐、直播等娱乐服务统一进入这里，方便按地区切换
- name: 流媒体
