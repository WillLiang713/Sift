# 微软服务 - Microsoft、OneDrive、Office、Windows 更新等普通微软服务
- name: 微软服务
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 节点选择
  - 自建节点
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 台湾节点
  - 韩国节点
  - 其他节点
