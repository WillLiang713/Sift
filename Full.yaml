rules:
# 局域网 / 私有地址
- RULE-SET,private,DIRECT

# 国内服务可切换直连
- RULE-SET,google@cn,全球直连
- RULE-SET,apple@cn,全球直连
- RULE-SET,microsoft@cn,全球直连
- RULE-SET,category-games@cn,全球直连

# AI 服务
- RULE-SET,category-ai-!cn,AI

# 游戏平台
- RULE-SET,category-games,游戏平台

# 娱乐内容：视频、音乐、直播、动漫等泛娱乐内容
- RULE-SET,category-entertainment,娱乐内容

# 开发工具：代码托管、包管理器、开发文档等进入开发工具组
- RULE-SET,category-dev,开发工具

# Google / Apple / OneDrive / Microsoft 服务：用于普通品牌服务和商店地区控制
- RULE-SET,google,谷歌服务
- RULE-SET,apple,苹果服务
- RULE-SET,onedrive,OneDrive
- RULE-SET,microsoft,微软服务

# GFW 轻量代理规则命中
- RULE-SET,gfw,节点选择

# 国内兜底
- RULE-SET,geolocation-cn,全球直连
- GEOIP,CN,全球直连

# 最终兜底
- MATCH,漏网之鱼
