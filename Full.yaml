# 适用于 Mihomo 核心
# 精简分流：远程规则，局域网直连，国内流量进入「全球直连」可按需切换，代理流量进入「节点选择」，商店/娱乐内容/AI按场景分流，未命中规则流量进入「漏网之鱼」

proxy-groups:
# 节点选择 - 日常总控入口，优先选择策略组，避免直接展开大量节点
- name: 节点选择
  type: select
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"
  proxies:
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 手动切换 - 全节点手动池，细选具体节点时进入这里
- name: 手动切换
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"

# 自动测速代理组 - 根据测试 URL 和延迟自动选择节点
- name: 自动测速
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# AI - 海外 AI 服务统一进入这里，方便固定更稳定的出口
- name: AI
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 娱乐内容 - 视频、音乐、直播等泛娱乐内容统一进入这里，方便按地区切换
- name: 娱乐内容
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Star.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 谷歌服务 - Google Play、Gmail、Drive、Search 等普通 Google 服务和商店地区控制
- name: 谷歌服务
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 苹果服务 - App Store、iCloud、iTunes 等普通 Apple 服务和商店地区控制
- name: 苹果服务
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 微软服务 - Microsoft、Office、Windows 更新等普通微软服务
- name: 微软服务
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# OneDrive - OneDrive、SharePoint、云盘同步等流量
- name: OneDrive
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/OneDrive.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 开发工具 - GitHub、代码托管、包管理器、开发文档等流量
- name: 开发工具
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 游戏平台 - 保留独立入口，商店打不开时可手动切到指定节点或地区组
- name: 游戏平台
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

# 地区代理组 - 香港
- name: 香港节点
  type: url-test
  include-all: true
  filter: "(?i)🇭🇰|港|HK|HKG|HongKong|Hong Kong|香港"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 美国
- name: 美国节点
  type: url-test
  include-all: true
  filter: "(?i)🇺🇸|美|US|USA|United ?States|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|Portland|Dallas|Oregon|Phoenix|Fremont|Silicon Valley|Las Vegas|Los Angeles|San Jose|Santa Clara|Seattle|Chicago"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/US.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 日本
- name: 日本节点
  type: url-test
  include-all: true
  filter: "(?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|Tokyo|Osaka"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png"
  interval: 300
  tolerance: 50

# 地区代理组 - 新加坡
- name: 新加坡节点
  type: url-test
  include-all: true
  filter: "(?i)🇸🇬|SG|SGP|Singapore|新加坡|狮城"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png"
  interval: 300
  tolerance: 50

# 其他地区代理组
- name: 其他节点
  type: select
  include-all: true
  filter: "^(?!.*(港|HK|HKG|HongKong|Hong Kong|美|US|USA|United States|美国|洛杉矶|Los Angeles|圣何塞|San Jose|硅谷|日本|JP|Japan|东京|Tokyo|大阪|Osaka|新加坡|SG|SGP|Singapore|狮城)).*"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"

# 全球直连 - 默认直连，必要时可临时切到代理策略
- name: 全球直连
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png"
  proxies:
  - DIRECT
  - 节点选择
  - 自动测速

# 漏网之鱼 - 未命中分流规则的最终兜底出口
- name: 漏网之鱼
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"
  proxies:
  - 节点选择
  - 自动测速
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 其他节点
  - 手动切换
  - DIRECT

