rules:
# 局域网 / 私有地址
- RULE-SET,LocalAreaNetwork,DIRECT

# 国内服务、下载和地区检测直连
- RULE-SET,SteamCN,DIRECT
- RULE-SET,SteamRegionCheck,DIRECT
- RULE-SET,Download,DIRECT
- RULE-SET,GoogleCN,DIRECT

# AI 服务
- RULE-SET,AI,AI出口

# 流媒体 / 娱乐服务
- RULE-SET,ProxyMedia,流媒体

# 游戏平台
- RULE-SET,GameDownload,游戏平台
- RULE-SET,Steam,游戏平台
- RULE-SET,Epic,游戏平台
- RULE-SET,Origin,游戏平台
- RULE-SET,Blizzard,游戏平台
- RULE-SET,Nintendo,游戏平台
- RULE-SET,Sony,游戏平台
- RULE-SET,Xbox,游戏平台

# 开发工具：代码托管、包管理器、开发文档等进入开发工具组
- RULE-SET,Github,开发工具
- RULE-SET,Developer,开发工具

# Google / Apple / Microsoft 服务：用于普通品牌服务和商店地区控制
- RULE-SET,Google,谷歌服务
- RULE-SET,Apple,苹果服务
- RULE-SET,Microsoft,微软服务

# 海外常规代理
- RULE-SET,ProxyLite,代理出口

# 国内兜底
- RULE-SET,ChinaDomain,DIRECT
- RULE-SET,ChinaIp,DIRECT
- RULE-SET,ChinaIpV6,DIRECT
- GEOIP,CN,DIRECT

# 最终兜底
- MATCH,漏网之鱼
