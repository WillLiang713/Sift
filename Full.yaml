# Full：无节点规则、策略组和 DNS。

unified-delay: true
tcp-concurrent: true

# DNS：fake-ip；默认海外 DoH，国内直连域名返回真实 IP。
dns:
  enable: true
  listen: ":53"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - rule-set:fakeip-filter
    - rule-set:private
    - rule-set:google-cn
    - rule-set:apple-cn
    - rule-set:microsoft-cn
    - rule-set:games-cn
    - rule-set:cn-dns
  nameserver-policy:
    "rule-set:google-cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:apple-cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:microsoft-cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:games-cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:cn-dns":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

