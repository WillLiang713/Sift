# 自建节点代理组
- name: 自建节点
  type: select
  include-all: true
  filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 香港
- name: 香港节点
  type: url-test
  include-all: true
  filter: "(?i)🇭🇰|港|HK|HKG|HongKong|Hong Kong|香港"
  exclude-filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 美国
- name: 美国节点
  type: url-test
  include-all: true
  filter: "(?i)🇺🇸|美|US|USA|United ?States|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|Portland|Dallas|Oregon|Phoenix|Fremont|Silicon Valley|Las Vegas|Los Angeles|San Jose|Santa Clara|Seattle|Chicago"
  exclude-filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/US.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 日本
- name: 日本节点
  type: url-test
  include-all: true
  filter: "(?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|Tokyo|Osaka"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png"
  interval: 300
  tolerance: 50

# 地区代理组 - 新加坡
- name: 新加坡节点
  type: url-test
  include-all: true
  filter: "(?i)🇸🇬|SG|SGP|Singapore|新加坡|狮城"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png"
  interval: 300
  tolerance: 50

# 地区代理组 - 台湾
- name: 台湾节点
  type: url-test
  include-all: true
  filter: "(?i)🇹🇼|台|TW|Taiwan|台湾|台灣|台北|Taipei|桃園|Taoyuan|HiNet"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png"
  interval: 300
  tolerance: 50

# 地区代理组 - 韩国
- name: 韩国节点
  type: url-test
  include-all: true
  filter: "(?i)🇰🇷|韩|KR|Korea|韩国|首尔|Seoul"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png"
  interval: 300
  tolerance: 50

# 其他地区代理组
- name: 其他节点
  type: select
  include-all: true
  filter: "^(?!.*(港|HK|HKG|HongKong|Hong Kong|美|US|USA|United States|美国|洛杉矶|Los Angeles|圣何塞|San Jose|硅谷|日本|JP|Japan|东京|Tokyo|大阪|Osaka|新加坡|SG|SGP|Singapore|狮城|台|TW|Taiwan|台湾|台灣|台北|Taipei|桃園|Taoyuan|HiNet|韩|KR|Korea|韩国|首尔|Seoul)).*"
  exclude-filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 漏网之鱼 - 未命中分流规则的最终兜底出口
- name: 漏网之鱼
  type: select
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 自动测速
  - 手动切换
  - 自建节点
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 台湾节点
  - 韩国节点
  - 其他节点
  - DIRECT

rules:
# 局域网 / 私有地址
- GEOSITE,private,DIRECT
- GEOIP,private,DIRECT,no-resolve

# 国内服务和地区检测直连
- GEOSITE,steam@cn,DIRECT
- GEOSITE,category-games@cn,DIRECT
- GEOSITE,google-cn,DIRECT
- GEOSITE,apple-cn,DIRECT
- GEOSITE,microsoft@cn,DIRECT

# AI 服务
- GEOSITE,category-ai-!cn,AI出口

# 流媒体 / 娱乐服务
- GEOSITE,category-media,流媒体

# 游戏平台
- GEOSITE,category-games,游戏平台

# 开发工具：代码托管、包管理器、开发文档等进入开发工具组
- GEOSITE,category-dev,开发工具

# Google / Apple / Microsoft 服务：用于普通品牌服务和商店地区控制
- GEOSITE,google,谷歌服务
- GEOSITE,apple,苹果服务
- GEOSITE,microsoft,微软服务

# GFW 命中代理
- GEOSITE,gfw,手动切换

# 国内兜底
- GEOSITE,cn,DIRECT
- GEOIP,CN,DIRECT,no-resolve

# 最终兜底
- MATCH,漏网之鱼
